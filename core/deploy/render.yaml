services:
  - type: web
    name: kingbot-ultra
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --keep-alive 5 --max-requests 500 --max-requests-jitter 80
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
