<!doctype html>
<html lang="vi">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KingBot API Demo</title></head>
<body>
  <h3>Demo gắn API dự đoán vào HTML</h3>
  <select id="gate">
    <option value="hitclub">HitClub</option>
    <option value="b52">B52</option>
    <option value="lc79">LC79</option>
    <option value="sunwin">SunWin</option>
    <option value="bcr">Baccarat</option>
  </select>
  <button onclick="loadPredict()">Dự đoán</button>
  <pre id="result">Đang chờ...</pre>
  <script>
    async function loadPredict(){
      const gate = document.getElementById('gate').value;
      const res = await fetch(`/api/game/${gate}?level=pro`);
      const d = await res.json();
      document.getElementById('result').textContent =
        `Cổng: ${d.game}\nPhiên: ${d.period}\nKết quả: ${d.side_label}\n%: ${d.confidence}%\nCầu: ${d.pattern}\nDice/Tổng: ${d.dice || '-'} / ${d.total || '-'}`;
    }
    loadPredict();
  </script>
</body>
</html>
