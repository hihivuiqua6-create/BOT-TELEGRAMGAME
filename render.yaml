services:
  - type: web
    name: kingbot-render
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SHOP_NAME
        value: KingBot Luxury
